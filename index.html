<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile System</title>
</head>
<body>
    <h2>Login</h2>
    <input id="username" placeholder="Username" />
    <button onclick="login()">Login</button>

    <h2>Create Profile</h2>
    <input id="name" placeholder="Name" />
    <button onclick="createProfile()">Create</button>

    <h2>Profiles</h2>
    <button onclick="getProfiles()">Fetch Profiles</button>

    <pre id="output"></pre>

    <script>
    const BASE_URL = "https://gender-classification-api-production.up.railway.app/api";
    let token = "";

    async function login() {
    const username = document.getElementById("username").value;

    const res = await fetch(`${BASE_URL}/auth/test-login/`, {
        method: "POST",
        body: JSON.stringify({ username }),
    });

    const data = await res.json();
    token = data.access_token;
    alert("Logged in");
    }

    async function createProfile() {
    const name = document.getElementById("name").value;

    const res = await fetch(`${BASE_URL}/profiles`, {
        method: "POST",
        headers: {
        "Authorization": `Bearer ${token}`,
        "Content-Type": "application/json"
        },
        body: JSON.stringify({ name })
    });

    document.getElementById("output").innerText = JSON.stringify(await res.json(), null, 2);
    }

    async function getProfiles() {
    const res = await fetch(`${BASE_URL}/profiles/?limit=5`, {
        headers: {
        "Authorization": `Bearer ${token}`
        }
    });

    document.getElementById("output").innerText = JSON.stringify(await res.json(), null, 2);
    }
    </script>
</body>
</html>
